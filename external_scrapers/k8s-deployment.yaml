apiVersion: apps/v1
kind: Deployment
metadata:
  name: tsdb-scraper
  labels:
    app: tsdb-scraper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tsdb-scraper
  template:
    metadata:
      labels:
        app: tsdb-scraper
    spec:
      # Allow time for the scraper to drain in-flight scrapes and attempt a
      # final buffer flush before Kubernetes forcibly kills the pod.
      terminationGracePeriodSeconds: 30

      securityContext:
        runAsNonRoot: true
        runAsUser: 65532      # distroless nonroot UID
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault

      containers:
      - name: scraper
        # Update this tag to the version you want to deploy.
        image: tsdbai/tsdb-ai-scraper:v0.9
        imagePullPolicy: Always

        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]

        ports:
        - name: self-metrics
          containerPort: 9090
          protocol: TCP

        env:
        # ── Required ──────────────────────────────────────────────────────────
        # Internal K8s service DNS for the tsdb.ai ingestor.
        - name: INGEST_ENDPOINT
          value: "http://tsdb-server.tsdb-ai.svc.cluster.local:8080/ingest_samples"

        # Comma-separated Prometheus /metrics endpoints to scrape.
        - name: SCRAPE_URLS
          value: "http://<target-1>:9100/metrics,http://<target-2>:9100/metrics"

        # ── Tunable ──────────────────────────────────────────────────────────
        - name: SCRAPE_INTERVAL_SECONDS
          value: "30"

        - name: SCRAPE_TIMEOUT_SECONDS
          value: "15"

        # Value injected as job= on every sample. Use a meaningful name that
        # identifies this scraper deployment (e.g. "prod-k8s", "staging").
        - name: JOB_LABEL
          value: "k8s"

        # Port for /health and /metrics self-monitoring.
        - name: HEALTH_PORT
          value: "9090"

        # ── Probes ────────────────────────────────────────────────────────────
        # Liveness: restart the pod if /health stops responding.
        livenessProbe:
          httpGet:
            path: /health
            port: self-metrics
          initialDelaySeconds: 5
          periodSeconds: 15
          failureThreshold: 3

        # Readiness: hold traffic until the scraper is up.
        readinessProbe:
          httpGet:
            path: /health
            port: self-metrics
          initialDelaySeconds: 3
          periodSeconds: 10
          failureThreshold: 2

        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"   # headroom for the 50 MB retry buffer + working set
            cpu: "200m"

---
# Optional: expose the scraper's self-metrics to Prometheus inside the cluster.
apiVersion: v1
kind: Service
metadata:
  name: tsdb-scraper-metrics
  labels:
    app: tsdb-scraper
spec:
  selector:
    app: tsdb-scraper
  ports:
  - name: self-metrics
    port: 9090
    targetPort: self-metrics
  type: ClusterIP
