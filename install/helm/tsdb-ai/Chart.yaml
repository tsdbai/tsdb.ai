apiVersion: v2
name: tsdb-ai
description: |
  TSDB.ai — AI-native time-series database.
  Umbrella chart that deploys the core server, scraper agent, and admin UI
  together, plus the shared PersistentVolumeClaim and Ingress.
type: application
# version tracks the chart itself; bump on chart changes.
version: 0.9.0
# appVersion tracks the underlying app; used as the default image tag.
appVersion: "v0.9"
kubeVersion: ">=1.23.0-0"
home: https://tsdb.ai
icon: https://raw.githubusercontent.com/tsdb-ai/tsdb.ai/main/v0.9/admin-panel/public/favicon.svg
sources:
  - https://github.com/tsdb-ai/tsdb.ai
keywords:
  - tsdb
  - time-series
  - observability
  - monitoring
  - prometheus
  - promql
  - anomaly-detection
  - forecasting
  - ai
  - mcp
  - llm
maintainers:
  - name: TSDB.ai
    email: hello@tsdb.ai
    url: https://tsdb.ai

dependencies:
  - name: tsdb-server
    version: 0.9.0
    repository: "file://charts/tsdb-server"
    condition: tsdb-server.enabled
  - name: tsdb-scraper
    version: 0.9.0
    repository: "file://charts/tsdb-scraper"
    condition: tsdb-scraper.enabled
  - name: tsdb-ui
    version: 0.9.0
    repository: "file://charts/tsdb-ui"
    condition: tsdb-ui.enabled

# ─── Artifact Hub annotations ───────────────────────────────────────────────
# Rendered on the chart's Artifact Hub page. See:
#   https://artifacthub.io/docs/topics/annotations/helm/
annotations:
  # High-level classification.
  artifacthub.io/category: monitoring-logging
  artifacthub.io/license: "LicenseRef-TSDB-Source-Available"
  artifacthub.io/prerelease: "false"
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/operator: "false"

  # Links to primary docs and support channels (YAML-in-string format).
  artifacthub.io/links: |
    - name: Website
      url: https://tsdb.ai
    - name: Documentation
      url: https://tsdb.ai/docs
    - name: Source
      url: https://github.com/tsdb-ai/tsdb.ai
    - name: Helm guide
      url: https://github.com/tsdb-ai/tsdb.ai/blob/main/v0.9/docs/helm.md
    - name: Pro features
      url: https://tsdb.ai/pro

  # Images the chart pulls. Artifact Hub uses this for its image section and
  # (optionally) to pivot to security scan results.
  artifacthub.io/images: |
    - name: tsdb-ai-server
      image: docker.io/tsdbai/tsdb-ai-server:v0.9
    - name: tsdb-ai-scraper
      image: docker.io/tsdbai/tsdb-ai-scraper:v0.9
    - name: tsdb-ai-ui
      image: docker.io/tsdbai/tsdb-ai-ui:v0.9

  # Changelog entry for this release.
  artifacthub.io/changes: |
    - kind: added
      description: Initial Helm chart for TSDB.ai v0.9 (umbrella + server/scraper/ui subcharts).
    - kind: added
      description: Shared PVC and Ingress templates owned by the umbrella.
    - kind: added
      description: Per-component enable/disable toggles via Chart.yaml conditions.

  # Signals used by recommenders and filters.
  artifacthub.io/recommendations: |
    - url: https://artifacthub.io/packages/helm/ingress-nginx/ingress-nginx
    - url: https://artifacthub.io/packages/helm/cert-manager/cert-manager

  # Screenshots (pulled from the admin UI) — optional, left empty for now.
  # artifacthub.io/screenshots: |
  #   - title: AI Dashboard
  #     url: https://tsdb.ai/screenshots/ai-dashboard.png
