# tsdb-ui subchart values.
# Under the umbrella these are reached via `.Values["tsdb-ui"]`.

replicaCount: 1

image:
  registry: ""         # empty → inherit from global.image.registry
  repository: tsdbai/tsdb-ai-ui
  # tag: ""            # empty → falls back to .Chart.AppVersion
  pullPolicy: ""       # empty → inherit from global.image.pullPolicy

service:
  type: ClusterIP
  port: 3000
  targetPort: 3000
  portName: http

env: []
extraEnv: []
envFrom: []

resources:
  requests:
    memory: "32Mi"
    cpu: "25m"
  limits:
    memory: "128Mi"
    cpu: "100m"

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 3
  periodSeconds: 10

podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}
securityContext: {}
podSecurityContext: {}
