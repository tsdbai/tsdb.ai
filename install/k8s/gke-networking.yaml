apiVersion: gateway.networking.k8s.io/v1beta1
kind: Gateway
metadata:
  name: tsdb-gateway
  namespace: vectortsdb
  annotations:
    networking.gke.io/certmap: cloud-vectortsdb-com-map
spec:
  gatewayClassName: gke-l7-global-external-managed
  listeners:
  - name: https
    protocol: HTTPS
    port: 443
    allowedRoutes:
      namespaces:
        from: Same
  addresses:
  - type: NamedAddress
    value: tsdb-static-ip
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: tsdb-route
  namespace: vectortsdb
spec:
  parentRefs:
  - name: tsdb-gateway
    namespace: vectortsdb
  hostnames:
  - "cloud.vectortsdb.com"
  rules:
  # Ingestor 
  - matches:
    - path:
        type: PathPrefix
        value: /ingest_samples
    - path:
        type: PathPrefix
        value: /internal
    backendRefs:
    - name: vectortsdb-lb
      port: 8080
  
  # Query Gateway 
  - matches:
    - path:
        type: PathPrefix
        value: /api/v1
    backendRefs:
    - name: vectortsdb-lb
      port: 8081

  # Vector DB
  - matches:
    - path:
        type: PathPrefix
        value: /ingest
    - path:
        type: PathPrefix
        value: /search
    - path:
        type: PathPrefix
        value: /vectors
    backendRefs:
    - name: vectortsdb-lb
      port: 8085

  # Deduper
  - matches:
    - path:
        type: PathPrefix
        value: /ingest_block
    backendRefs:
    - name: vectortsdb-lb
      port: 8084

  # Metrics Exporter
  - matches:
    - path:
        type: PathPrefix
        value: /metrics
    backendRefs:
    - name: vectortsdb-lb
      port: 9102

  # MCP Server (AI Agent) - SSE Stream
  - matches:
    - path:
        type: PathPrefix
        value: /sse
    backendRefs:
    - name: vectortsdb-lb
      port: 8000
      
  # DEFAULT CATCH-ALL RULE (Handles all other traffic not matched above)
  - backendRefs:
    - name: vectortsdb-lb
      port: 9102

---
apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: health-check-policy
  namespace: vectortsdb
spec:
  targetRef:
    group: ""
    kind: Service
    name: vectortsdb-lb
  default:
    config:
      type: HTTP
      httpHealthCheck:
        requestPath: /health
        port: 9102
    logConfig:
      enabled: true
---
apiVersion: v1
kind: Service
metadata:
  name: vectortsdb-lb
  namespace: vectortsdb
spec:
  type: ClusterIP
  selector:
    app: vectortsdb
  ports:
  - name: ingestor
    port: 8080
    targetPort: 8080
  - name: query-gateway
    port: 8081
    targetPort: 8081
  - name: deduper
    port: 8084
    targetPort: 8084
  - name: vector-db
    port: 8085
    targetPort: 8085
  - name: self-exporter
    port: 9102
    targetPort: 9102
  - name: mcp-server
    port: 8000
    targetPort: 8000
