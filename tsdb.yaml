# =============================================================================
# TSDB.ai Configuration  —  v0.9
#
# All settings are optional.  Any key that is omitted falls back to the
# built-in default shown in the comments.  The file is read once at startup
# by every TSDB.ai service binary.
#
# Deployment presets are documented in-line:
#   [small]  — single node, development, < 100 metrics, < 4 GB RAM
#   [large]  — multi-node cluster, production, thousands of metrics, 16+ GB RAM
# =============================================================================


# ── License ───────────────────────────────────────────────────────────────────
license:
  key: ""  # Add your license key here — get one at https://tsdb.ai/pro


# ── Network / Ports ───────────────────────────────────────────────────────────
#
# Changing a port here also requires updating the corresponding supervisord.conf
# entry and any firewall / k8s Service definitions.
server:
  ingest_port:       8080   # Ingestor HTTP port
  query_port:        8081   # Query Gateway HTTP port (Prometheus-compatible)
  deduper_port:      8084   # Deduplication Service HTTP port
  exporter_port:     9102   # Self-monitoring metrics exporter (Prometheus scrape target)
  mock_source_port:  9101   # Mock data source port (dev / demo only)
  vector_port:       8085   # Vector Store HTTP port

  # Endpoint the ingestor POSTs enriched vectors to
  vector_db_endpoint: "http://localhost:8085/ingest"

  # Endpoint the WAL shipper uploads completed blocks to
  deduper_endpoint: "http://localhost:8084/ingest_block"

  # HA peer replica addresses for cross-node consistency (leave empty for single-node)
  # Example: peer_nodes: ["http://node2:8080", "http://node3:8080"]
  peer_nodes: []


# ── Data Storage ──────────────────────────────────────────────────────────────
#
# All data sub-directories are derived from root automatically:
#   {root}/wal                   — WAL batch files
#   {root}/blocks/staging        — blocks awaiting upload to deduper
#   {root}/blocks/canonical      — deduplicated long-term blocks
#   {root}/index                 — LTS block index database
#   {root}/events/anomalies      — per-event anomaly JSON records
#   {root}/events/regimes        — regime-change JSON records
#   {root}/registry/patterns.json
#   {root}/registry/causal.json
#   {root}/registry/relationships.json
#   {root}/checkpoint.json       — head-cache snapshot
#
# To use a mounted volume set root to the mount path, e.g. "/data/tsdb"
data:
  root: "./tsdb.ai-data"


# ── Ingestion Engine ──────────────────────────────────────────────────────────
ingestion:
  # Number of raw samples buffered per series before compression is triggered.
  # [small] 50–100   [large] 500–1000
  samples_per_segment: 100

  # Adaptive ceiling — compression fires regardless of sample count when this
  # limit is reached (guards against very slow series never compressing).
  # [small] 500   [large] 5000
  max_samples_per_segment: 1000

  # AdaptiveFit RMSE tolerance.  Lower = higher fidelity, less compression.
  # Raise for lossy-but-smaller storage; lower for precise reconstruction.
  # [small] 10.0   [large] 5.0–20.0 depending on SLA
  rmse_tolerance: 10.0

  # Number of independent RWMutex shards.  Must be a power of two.
  # [small] 16–64   [large] 512–1024
  num_shards: 256

  # WAL batch writer: flush after this many chunks…
  # [small] 100   [large] 1000–5000
  wal_batch_size: 500

  # …or after this many milliseconds, whichever comes first.
  # [small] 500   [large] 100–200
  wal_batch_interval_ms: 200

  # How often (seconds) the in-memory index is synced to the local index DB.
  index_sync_interval_s: 5


# ── WAL Shipper ───────────────────────────────────────────────────────────────
shipper:
  # How often (seconds) the shipper scans for completed WAL files.
  # [small] 30–60   [large] 5–10
  poll_interval_s: 10

  # Group chunks into blocks spanning this many minutes.
  # [small] 5   [large] 1–2
  block_time_window_min: 2

  # Maximum HTTP retries when pushing a block to the deduper.
  max_retries: 5

  # Initial retry backoff in milliseconds (doubles each attempt).
  initial_backoff_ms: 500

  # Parallel goroutines for uploading blocks to the deduper.
  # [small] 1–2   [large] 8–16
  upload_workers: 4

  # Pending upload queue depth (jobs buffered before inline push).
  # [small] 20   [large] 500
  upload_queue_capacity: 100

  # How often (seconds) the disk-usage cleanup policy is evaluated.
  cleanup_interval_s: 10

  # Emergency cleanup fires when disk usage reaches this percentage.
  # Blocks are deleted oldest-first until usage drops 5 pp below threshold.
  disk_usage_threshold_pct: 90.0

  # Blocks older than this (minutes) are eligible for age-based deletion.
  # Set to 0 to disable age-based cleanup and rely only on disk pressure.
  # [small] 60   [large] 1440 (1 day) — set much higher in prod
  max_block_age_minutes: 1440


# ── Deduplication Service ─────────────────────────────────────────────────────
deduper:
  # How often (minutes) the retention policy scans canonical blocks.
  retention_check_interval_min: 10

  # Canonical blocks older than this (minutes) are deleted.
  # Default 43200 = 30 days.  Set to 0 to keep forever (not recommended).
  # [small] 10080 (7 days)   [large] 129600 (90 days) or longer
  max_canonical_age_minutes: 43200


# ── Query Gateway ─────────────────────────────────────────────────────────────
query:
  # Per-query execution timeout in seconds.
  timeout_s: 30

  # Points synthesised when reconstructing a series from polynomial models.
  # [small] 50   [large] 200–500
  synthesize_points: 100

  # LRU cache size for query results.  Accepts "500MB", "2GB", etc.
  # [small] "100MB"   [large] "4GB"–"16GB"
  max_cache_size: "500MB"

  # Proactive eviction headroom as a fraction (0.20 = evict when 80% full).
  eviction_headroom_pct: 0.20

  # How often (seconds) the metric symbol table is refreshed.
  symbol_refresh_interval_s: 30

  # How often (seconds) the canonical block file catalog is rescanned.
  file_index_interval_s: 10

  # Parallel goroutines for scanning LTS blocks during a query.
  # [small] 2   [large] 16–32
  lts_scan_workers: 8

  # Path to the WASM model evaluation module.
  wasm_module_path: "model_core.wasm"

  # Storage node endpoints (advanced — only change for multi-node setups)
  head_node_url:  "http://localhost:8080"
  index_node_url: "http://localhost:8083"


# ── Anomaly Detection ─────────────────────────────────────────────────────────
anomaly:
  # An anomaly is declared when current RMSE > historical_mean_rmse × multiplier.
  # [small] 2.5–3.0 (more sensitive)   [large] 3.0–5.0 (less noise)
  rmse_multiplier: 3.0

  # Minimum chunks ingested before anomaly detection activates for a series.
  min_chunks_for_history: 5

  # Depth of the model-ID ring buffer used for regime-change detection.
  # [small] 5   [large] 20–50
  regime_history_len: 10

  # Seasonal time slots (weekday × hour).  168 = 7 days × 24 hours.
  # Only change if you want coarser (e.g. 24) or finer granularity.
  seasonal_slots: 168


# ── Pattern Registry ──────────────────────────────────────────────────────────
patterns:
  # Cosine similarity threshold for auto-annotating a new vector as a known pattern.
  # [small] 0.90   [large] 0.95 (stricter, fewer false positives)
  match_threshold: 0.92

  # Maximum entries kept in the registry (LRU eviction when exceeded).
  # [small] 100   [large] 5000
  max_registry_size: 500

  # Patterns not matched within this many days are evicted by the age pass.
  # [small] 30   [large] 365
  max_age_days: 90


# ── Causal Analysis ───────────────────────────────────────────────────────────
causal:
  # Background analysis cycle in seconds.
  # [small] 300   [large] 30–60
  analysis_interval_s: 60

  # Maximum outgoing causal edges per metric (fan-out cap).
  # [small] 3   [large] 10
  max_edges_per_node: 5

  # Causal edges not re-observed within this window (minutes) are pruned.
  # IMPORTANT: raise to 1440+ (1 day) in production — 10 min is demo-only.
  # [small] 60   [large] 1440–10080
  edge_ttl_minutes: 10

  # Lag offsets tested when searching for leading-indicator relationships.
  # Values are in seconds.  Cover the latency range of your inter-service calls.
  # [small] [10, 30, 60]   [large] [5, 10, 30, 60, 120, 300, 600]
  lag_offsets_s: [5, 10, 30, 60, 120, 300]


# ── Relationship Graph ────────────────────────────────────────────────────────
relationships:
  # Background scanner cycle in seconds.
  # [small] 300   [large] 60–90
  scan_interval_s: 90

  # Minimum cosine similarity to create a structural similarity edge.
  # [small] 0.80   [large] 0.90 (stricter)
  min_score: 0.85

  # Hard cap on total edges.  Lowest-scoring edges are evicted when exceeded.
  # [small] 500   [large] 50000
  max_edges_total: 5000

  # Relationship edges not re-confirmed within this window (minutes) are pruned.
  # IMPORTANT: raise to 1440+ in production — 10 min is demo-only.
  # [small] 60   [large] 1440–10080
  edge_ttl_minutes: 10


# ── Vector Store ──────────────────────────────────────────────────────────────
vectors:
  # Cosine score above which a new vector is considered a semantic duplicate
  # of an existing entry and is merged rather than inserted.
  # [small] 0.99   [large] 0.995 (tighter dedup)
  match_threshold: 0.99

  # Vectors whose change magnitude is below this threshold are filtered as
  # "boring" and not stored (keeps the vector DB lean).
  # [small] 0.01   [large] 0.005 (capture subtler patterns)
  interesting_threshold: 0.01

  # Async ingest queue depth for the vector store.
  # [small] 100   [large] 5000
  ingest_queue_capacity: 1000


# ── Scraper Agent ─────────────────────────────────────────────────────────────
scraper:
  # Prometheus endpoint to scrape for internal TSDB metrics.
  target_endpoint: "http://localhost:9102/metrics"

  # Ingestor endpoint where scraped samples are forwarded.
  ingest_endpoint: "http://localhost:8080/ingest_samples"

  # Scrape interval in seconds.
  # [small] 60   [large] 15–30
  interval_s: 30

  # HTTP timeout per scrape request in seconds.
  timeout_s: 20

  # Maximum resiliency buffer size in bytes before samples are dropped.
  # [small] 10485760 (10 MB)   [large] 524288000 (500 MB)
  max_buffer_bytes: 52428800   # 50 MB

  # Optional proxy for scrape requests (leave empty to connect directly).
  # Supports HTTP, HTTPS, and SOCKS5 proxies.
  # Examples:
  #   proxy_url: "http://proxy.corp.example.com:3128"
  #   proxy_url: "https://proxy.corp.example.com:8443"
  #   proxy_url: "socks5://user:pass@proxy.corp.example.com:1080"
  # Note: this applies only to outbound scrape requests, NOT to ingestor pushes.
  proxy_url: ""


# ── Forecasting ───────────────────────────────────────────────────────────────
forecasting:
  # Default forecast horizon in seconds when no horizon is specified in the request.
  default_horizon_s: 300.0   # 5 minutes

  # Minimum confidence band half-width (prevents zero-width intervals on flat series).
  confidence_floor: 0.001


# ── S3 / Object Storage (Long-Term Storage) ───────────────────────────────────
#
# When enabled, the deduper uploads every canonical block to S3 after writing
# it locally.  The query gateway transparently falls back to S3 for any block
# whose local copy has been evicted.  This implements a Thanos-style tiered
# storage model: local disk = hot short-term buffer, S3 = authoritative LTS.
#
# Supported backends:
#   AWS S3            — leave endpoint empty, set region + credentials
#   MinIO             — set endpoint to MinIO URL, use_path_style: true
#   Cloudflare R2     — set endpoint to https://<acct>.r2.cloudflarestorage.com
#   Any S3-compatible — set endpoint + use_path_style as needed
#
# Credentials are read from this file OR from environment variables:
#   AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY
# Environment variables take precedence over empty config values.
s3:
  # Master switch.  Set to true to activate S3 upload and tiered querying.
  enabled: false

  # S3-compatible endpoint URL.  Leave empty to target native AWS S3.
  # AWS S3:   (leave empty — endpoint is derived from region automatically)
  # MinIO:    endpoint: "http://minio:9000"
  # R2:       endpoint: "https://<account-id>.r2.cloudflarestorage.com"
  endpoint: ""

  # AWS region.  Used for request signing and (when endpoint is empty) the
  # default endpoint URL.
  region: "us-east-1"

  # Bucket name.  Must already exist; TSDB.ai does not create buckets.
  bucket: "tsdb-ai-lts"

  # All block objects are stored under this prefix inside the bucket.
  # Include the trailing slash.  Use "" to store at the bucket root.
  prefix: "blocks/"

  # Credentials.  Leave empty to fall back to environment variables.
  access_key_id:     ""
  secret_access_key: ""

  # Set true for MinIO and other non-AWS endpoints that require path-style URLs.
  # Path-style:    https://endpoint/bucket/key
  # Virtual-host:  https://bucket.endpoint/key  (AWS default)
  use_path_style: false

  # Parallel goroutines uploading blocks to S3.
  # [small] 2   [large] 8–16
  upload_workers: 4

  # Depth of the async upload queue (blocks buffered before back-pressure).
  # [small] 64   [large] 1024
  upload_queue_capacity: 256

  # HTTP timeout (seconds) for a single PutObject call.
  upload_timeout_s: 60

  # HTTP timeout (seconds) for a single GetObject call (query-time fetch).
  download_timeout_s: 30

  # How long (minutes) to keep a local canonical block after it has been
  # successfully uploaded to S3.  After this window expires the deduper's
  # retention checker deletes the local copy; future queries fetch from S3.
  #
  # Because TSDB.ai's polynomial blocks are extremely small (typically < 50 KB
  # per 2-hour window regardless of series count), it is practical to keep
  # local copies for very long periods.
  #
  # 0           = keep local copies forever (S3 is a backup replica only)
  # 86400       = 60 days (default — recommended starting point)
  # 20160       = 14 days
  # [small] 86400   [large] 10080–86400
  retention_after_upload_min: 86400   # 60 days

  # Objects larger than this (MB) use multipart upload.
  # The default handles all normal canonical blocks; only raise if you are
  # storing very large batch exports in the same bucket.
  multipart_threshold_mb: 100

  # Size (MB) of each part in a multipart upload.
  multipart_part_size_mb: 50
